<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>디지털 각도계</title>
<style>
  :root{
    --bg:#15181D; --bezel:#22262D; --panel:#0C0F12;
    --amber:#FFB000; --amber-dim:rgba(255,176,0,0.35);
    --cyan:#33D6C0; --text:#C9D1D9; --text-dim:#6B7480; --danger:#FF5C5C;
    --radius:18px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none;}
  html,body{margin:0;padding:0;height:100%;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;
    overflow:hidden;overscroll-behavior:none;}
  #app{display:flex;flex-direction:column;height:100dvh;width:100vw;
    padding:max(10px,env(safe-area-inset-top)) max(10px,env(safe-area-inset-right)) max(10px,env(safe-area-inset-bottom)) max(10px,env(safe-area-inset-left));
    gap:8px;}

  header{display:flex;align-items:center;gap:10px;padding:4px;flex-shrink:0;}
  header h1{font-size:15px;font-weight:700;letter-spacing:0.06em;margin:0;}
  header span{display:block;font-size:10px;color:var(--text-dim);letter-spacing:0.1em;margin-top:2px;}

  .display-panel{background:linear-gradient(180deg,var(--bezel),var(--bg));border-radius:var(--radius);
    padding:3px;flex-shrink:0;box-shadow:0 1px 0 rgba(255,255,255,0.04) inset,0 6px 14px rgba(0,0,0,0.35);}
  .display-screen{background:var(--panel);border-radius:calc(var(--radius) - 3px);padding:10px 16px;
    display:flex;align-items:center;justify-content:space-between;box-shadow:inset 0 2px 6px rgba(0,0,0,0.6);}
  .display-left{display:flex;flex-direction:column;min-width:0;}
  .display-label{font-size:10px;letter-spacing:0.2em;color:var(--text-dim);font-weight:700;}
  #statusText{font-size:11.5px;color:var(--cyan);margin-top:4px;min-height:14px;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  #angleValue{font-family:"SFMono-Regular",Consolas,Menlo,monospace;font-size:38px;font-weight:700;
    color:var(--amber);text-shadow:0 0 10px var(--amber-dim);letter-spacing:0.02em;line-height:1;
    text-align:right;flex-shrink:0;padding-left:10px;}

  .main{display:flex;gap:8px;flex:1;min-height:0;}
  .stage-wrap{position:relative;flex:1;min-width:0;
    background:repeating-linear-gradient(0deg,#0000 0 23px,rgba(255,255,255,0.02) 23px 24px);
    border-radius:var(--radius);overflow:hidden;box-shadow:inset 0 0 0 1px rgba(255,255,255,0.05);}
  canvas{display:block;width:100%;height:100%;touch-action:none;}
  .empty-hint{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:10px;pointer-events:none;padding:20px;text-align:center;}
  .empty-hint svg{opacity:0.35;}
  .empty-hint p{color:var(--text-dim);font-size:13px;max-width:220px;margin:0;line-height:1.5;}

  .angle-side{width:78px;flex-shrink:0;background:var(--panel);border-radius:14px;
    display:flex;flex-direction:column;padding:8px 6px;gap:6px;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,0.05);}
  .side-title{font-size:9px;letter-spacing:0.15em;color:var(--text-dim);font-weight:700;text-align:center;flex-shrink:0;}
  .side-scroll{flex:1;min-height:0;overflow-y:auto;display:flex;flex-direction:column;gap:6px;}
  .side-scroll::-webkit-scrollbar{width:0;}
  .side-empty{font-size:10px;color:var(--text-dim);text-align:center;margin-top:10px;line-height:1.5;opacity:0.7;}
  .angle-chip{display:flex;flex-direction:column;align-items:center;gap:3px;
    background:linear-gradient(180deg,#20242B,#171A1F);border-radius:10px;padding:8px 4px;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,0.05);cursor:pointer;position:relative;}
  .angle-chip .top{display:flex;align-items:center;gap:4px;}
  .angle-chip .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .angle-chip .num{font-size:9px;color:var(--text-dim);font-weight:700;}
  .angle-chip .val{font-size:14px;font-weight:700;color:var(--text);
    font-family:"SFMono-Regular",Consolas,Menlo,monospace;}
  .angle-chip.pressing{background:linear-gradient(180deg,#3a1f22,#2a1518);box-shadow:inset 0 0 0 1px var(--danger);}

  .controls{display:grid;grid-template-columns:1fr 1fr;gap:8px;flex-shrink:0;}
  .controls .wide{grid-column:1 / -1;display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  button{appearance:none;border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;
    color:var(--text);background:linear-gradient(180deg,#2A2F37,#1D2026);border-radius:12px;padding:12px 8px;
    display:flex;align-items:center;justify-content:center;gap:6px;
    box-shadow:0 2px 0 rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.06);}
  button:active{transform:translateY(1px);box-shadow:0 1px 0 rgba(0,0,0,0.5),inset 0 1px 3px rgba(0,0,0,0.5);}
  button.primary{color:var(--panel);background:linear-gradient(180deg,#3EE8CE,var(--cyan));}
  button.save{color:var(--panel);background:linear-gradient(180deg,#FFC94D,var(--amber));}
  button.ghost{color:var(--text-dim);background:linear-gradient(180deg,#23272E,#1A1D22);font-weight:600;font-size:12px;}
  button.danger-ghost{color:var(--danger);background:linear-gradient(180deg,#23272E,#1A1D22);font-weight:600;font-size:12px;}
  button:disabled{opacity:0.35;pointer-events:none;}

  #instructions{text-align:center;font-size:11.5px;color:var(--text-dim);margin:0;padding-bottom:2px;flex-shrink:0;line-height:1.5;}

  .toast{position:fixed;left:50%;bottom:calc(90px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(10px);
    background:rgba(12,15,18,0.95);color:var(--text);font-size:12.5px;font-weight:600;padding:10px 16px;border-radius:20px;
    box-shadow:0 4px 16px rgba(0,0,0,0.5),inset 0 0 0 1px rgba(255,255,255,0.08);opacity:0;pointer-events:none;
    transition:opacity .2s,transform .2s;z-index:50;max-width:80vw;text-align:center;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div id="app">
  <header>
    <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
      <path d="M4 20 L20 20" stroke="#33D6C0" stroke-width="2" stroke-linecap="round"/>
      <path d="M4 20 L18 6" stroke="#33D6C0" stroke-width="2" stroke-linecap="round"/>
      <path d="M11 20 A9 9 0 0 1 12.3 13.2" stroke="#FFB000" stroke-width="2" fill="none" stroke-linecap="round"/>
    </svg>
    <h1>디지털 각도계<span>핀치 확대 · 길게 눌러 삭제 · 갤러리 저장</span></h1>
  </header>

  <div class="display-panel">
    <div class="display-screen">
      <div class="display-left">
        <div class="display-label" id="displayLabel">ANGLE</div>
        <div id="statusText">이미지를 불러와 시작하세요</div>
      </div>
      <div id="angleValue">--.-°</div>
    </div>
  </div>

  <div class="main">
    <div class="stage-wrap" id="stageWrap">
      <canvas id="stage"></canvas>
      <div class="empty-hint" id="emptyHint">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <rect x="6" y="10" width="36" height="28" rx="4" stroke="#6B7480" stroke-width="2"/>
          <circle cx="17" cy="20" r="3.5" stroke="#6B7480" stroke-width="2"/>
          <path d="M6 32 L17 24 L26 30 L34 20 L42 27" stroke="#6B7480" stroke-width="2" fill="none"/>
        </svg>
        <p>사진을 촬영하거나 갤러리에서<br>이미지를 불러오세요</p>
      </div>
    </div>
    <div class="angle-side">
      <div class="side-title">각도 목록</div>
      <div class="side-scroll" id="sideScroll">
        <div class="side-empty" id="sideEmpty">아직<br>없음</div>
      </div>
    </div>
  </div>

  <div class="controls">
    <div class="wide">
      <button id="btnCamera" class="primary">📷 사진 촬영</button>
      <button id="btnGallery" class="primary">🖼 갤러리에서 선택</button>
    </div>
    <button id="btnUndo" class="ghost">↩ 마지막 점 취소</button>
    <button id="btnReset" class="danger-ghost">⟲ 전체 초기화</button>
    <div class="wide">
      <button id="btnSave" class="save" disabled>💾 갤러리에 저장</button>
    </div>
  </div>

  <p id="instructions">이미지를 불러와 시작하세요</p>
</div>

<div class="toast" id="toast"></div>

<input type="file" id="fileCamera" accept="image/*" capture="environment" hidden>
<input type="file" id="fileGallery" accept="image/*" hidden>

<script>
(function(){
  const canvas=document.getElementById('stage');
  const ctx=canvas.getContext('2d');
  const stageWrap=document.getElementById('stageWrap');
  const emptyHint=document.getElementById('emptyHint');
  const angleValueEl=document.getElementById('angleValue');
  const displayLabelEl=document.getElementById('displayLabel');
  const statusTextEl=document.getElementById('statusText');
  const instructionsEl=document.getElementById('instructions');
  const sideScroll=document.getElementById('sideScroll');
  const sideEmpty=document.getElementById('sideEmpty');
  const btnSave=document.getElementById('btnSave');
  const toastEl=document.getElementById('toast');

  const PALETTE=['#33D6C0','#FF6B9D','#7C9EFF','#FFD166','#8CFF7C','#FF8F5C','#C792EA','#5CD3FF'];
  const MOVE_THRESH=8, LONGPRESS_MS=500, HIT_R=26;

  let img=null,imgW=0,imgH=0;
  let measurements=[]; // groups of up to 3 image-space points
  let view={scale:1,tx:0,ty:0};
  let fitScale=1,fitTx=0,fitTy=0;

  // gesture state
  const pointers=new Map();
  let gesture='none';
  let downPos=null, dragTarget=null;
  let panStart=null, panStartView=null;
  let longTimer=null;
  let pinch=null;

  function vibrate(ms){ if(navigator.vibrate) try{navigator.vibrate(ms);}catch(e){} }
  let toastTimer=null;
  function toast(msg){ toastEl.textContent=msg; toastEl.classList.add('show');
    clearTimeout(toastTimer); toastTimer=setTimeout(()=>toastEl.classList.remove('show'),1800); }

  function resizeCanvas(){
    const dpr=window.devicePixelRatio||1;
    const rect=stageWrap.getBoundingClientRect();
    canvas.width=Math.max(1,Math.round(rect.width*dpr));
    canvas.height=Math.max(1,Math.round(rect.height*dpr));
    canvas.style.width=rect.width+'px'; canvas.style.height=rect.height+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
    computeFit();
    if(!img || view.scale<fitScale*0.999) setViewToFit(); else clampView();
    render();
  }
  window.addEventListener('resize',resizeCanvas);
  window.addEventListener('orientationchange',()=>setTimeout(()=>{computeFit();setViewToFit();render();},250));

  function computeFit(){
    const rect=canvas.getBoundingClientRect();
    const cw=rect.width,ch=rect.height;
    if(!img){fitScale=1;fitTx=0;fitTy=0;return;}
    fitScale=Math.min(cw/imgW,ch/imgH);
    fitTx=(cw-imgW*fitScale)/2; fitTy=(ch-imgH*fitScale)/2;
  }
  function setViewToFit(){ view={scale:fitScale,tx:fitTx,ty:fitTy}; }
  function clampView(){
    const rect=canvas.getBoundingClientRect();
    const cw=rect.width,ch=rect.height;
    if(view.scale<fitScale) view.scale=fitScale;
    const sw=imgW*view.scale, sh=imgH*view.scale;
    view.tx = sw<=cw ? (cw-sw)/2 : Math.min(0,Math.max(cw-sw,view.tx));
    view.ty = sh<=ch ? (ch-sh)/2 : Math.min(0,Math.max(ch-sh,view.ty));
  }
  function imageToCanvas(p){return {x:p.x*view.scale+view.tx, y:p.y*view.scale+view.ty};}
  function canvasToImage(p){return {x:(p.x-view.tx)/view.scale, y:(p.y-view.ty)/view.scale};}

  function angleOf(pt,v){return Math.atan2(pt.y-v.y,pt.x-v.x);}
  function computeAngle(g){ if(g.length<3)return null; const[a,v,b]=g;
    let d=Math.abs(angleOf(a,v)-angleOf(b,v)); if(d>Math.PI)d=Math.PI*2-d; return d*180/Math.PI; }
  function normalize(x,y){const l=Math.hypot(x,y)||1;return{x:x/l,y:y/l};}

  function drawScene(g2,mapFn,s){
    measurements.forEach((group,gi)=>{
      const color=PALETTE[gi%PALETTE.length];
      const cp=group.map(mapFn);
      if(cp.length>=2){
        g2.save();g2.strokeStyle=color;g2.lineWidth=2.5*s;
        g2.beginPath();g2.moveTo(cp[1].x,cp[1].y);g2.lineTo(cp[0].x,cp[0].y);g2.stroke();
        if(cp.length>=3){g2.beginPath();g2.moveTo(cp[1].x,cp[1].y);g2.lineTo(cp[2].x,cp[2].y);g2.stroke();}
        g2.restore();
      }
      if(cp.length>=3) drawArcLabel(g2,cp,s);
      cp.forEach((p,i)=>drawPoint(g2,p,i,color,s));
    });
  }
  function drawArcLabel(g2,cp,s){
    const v=cp[1];
    const d0=Math.hypot(cp[0].x-v.x,cp[0].y-v.y), d2=Math.hypot(cp[2].x-v.x,cp[2].y-v.y);
    const a1=Math.atan2(cp[0].y-v.y,cp[0].x-v.x), a2=Math.atan2(cp[2].y-v.y,cp[2].x-v.x);
    let delta=a2-a1; while(delta<=-Math.PI)delta+=Math.PI*2; while(delta>Math.PI)delta-=Math.PI*2;
    const r=Math.min(46*s,0.9*d0,0.9*d2);
    if(r>=6){g2.save();g2.strokeStyle='#FFB000';g2.lineWidth=2*s;
      g2.beginPath();g2.arc(v.x,v.y,r,a1,a2,delta<0);g2.stroke();g2.restore();}
    const u1=normalize(cp[0].x-v.x,cp[0].y-v.y), u2=normalize(cp[2].x-v.x,cp[2].y-v.y);
    let bx=u1.x+u2.x,by=u1.y+u2.y; const bl=Math.hypot(bx,by);
    const bis = bl<1e-6 ? {x:-u1.y,y:u1.x} : {x:bx/bl,y:by/bl};
    const lr=r+20*s, lp={x:v.x+bis.x*lr,y:v.y+bis.y*lr};
    let dd=Math.abs(a1-a2); if(dd>Math.PI)dd=Math.PI*2-dd;
    const text=(dd*180/Math.PI).toFixed(1)+'°';
    g2.save();g2.font=`bold ${13*s}px -apple-system,sans-serif`;g2.textAlign='center';g2.textBaseline='middle';
    const tw=g2.measureText(text).width,px=6*s,py=4*s;
    g2.fillStyle='rgba(12,15,18,0.82)';
    roundRect(g2,lp.x-tw/2-px,lp.y-8*s-py,tw+px*2,16*s+py*2,6*s);g2.fill();
    g2.fillStyle='#FFB000';g2.fillText(text,lp.x,lp.y);g2.restore();
  }
  function roundRect(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);
    c.arcTo(x+w,y,x+w,y+h,r);c.arcTo(x+w,y+h,x,y+h,r);c.arcTo(x,y+h,x,y,r);c.arcTo(x,y,x+w,y,r);c.closePath();}
  function drawPoint(g2,p,i,color,s){
    const vtx=i===1;
    g2.save();g2.beginPath();g2.arc(p.x,p.y,(vtx?10:7.5)*s,0,Math.PI*2);
    g2.fillStyle=vtx?'#FFB000':color;g2.fill();g2.lineWidth=2*s;g2.strokeStyle='#0C0F12';g2.stroke();
    g2.fillStyle='#0C0F12';g2.font=`bold ${11*s}px -apple-system,sans-serif`;
    g2.textAlign='center';g2.textBaseline='middle';g2.fillText(String(i+1),p.x,p.y);g2.restore();
  }
  function render(){
    const rect=canvas.getBoundingClientRect();
    ctx.clearRect(0,0,rect.width,rect.height);
    if(img) ctx.drawImage(img,view.tx,view.ty,imgW*view.scale,imgH*view.scale);
    drawScene(ctx,imageToCanvas,1);
  }

  function lastCompleted(){
    for(let i=measurements.length-1;i>=0;i--) if(measurements[i].length===3)
      return{value:computeAngle(measurements[i]),index:i+1};
    return null;
  }
  function updateReadout(){
    const l=lastCompleted();
    if(!l){angleValueEl.textContent='--.-°';displayLabelEl.textContent='ANGLE';}
    else{angleValueEl.textContent=l.value.toFixed(1)+'°';displayLabelEl.textContent='ANGLE #'+l.index;}
  }
  function updateSide(){
    const done=measurements.map((g,gi)=>({gi,g})).filter(o=>o.g.length===3);
    if(done.length===0){ sideEmpty.style.display='block';
      Array.from(sideScroll.querySelectorAll('.angle-chip')).forEach(n=>n.remove()); return; }
    sideEmpty.style.display='none';
    Array.from(sideScroll.querySelectorAll('.angle-chip')).forEach(n=>n.remove());
    done.forEach(({gi,g})=>{
      const color=PALETTE[gi%PALETTE.length];
      const chip=document.createElement('div');
      chip.className='angle-chip';
      chip.innerHTML=`<div class="top"><span class="dot" style="background:${color}"></span><span class="num">#${gi+1}</span></div><div class="val">${computeAngle(g).toFixed(1)}°</div>`;
      let t=null;
      const startPress=(e)=>{ e.preventDefault(); chip.classList.add('pressing');
        t=setTimeout(()=>{ chip.classList.remove('pressing'); deleteGroup(gi); vibrate(30); toast('각도 #'+(gi+1)+' 삭제됨'); },LONGPRESS_MS); };
      const cancelPress=()=>{ chip.classList.remove('pressing'); if(t){clearTimeout(t);t=null;} };
      chip.addEventListener('pointerdown',startPress);
      chip.addEventListener('pointerup',cancelPress);
      chip.addEventListener('pointerleave',cancelPress);
      chip.addEventListener('pointercancel',cancelPress);
      chip.addEventListener('contextmenu',e=>e.preventDefault());
      sideScroll.appendChild(chip);
    });
  }
  function updateUI(){
    updateSide();
    btnSave.disabled=!img;
    if(!img){statusTextEl.textContent='이미지를 불러와 시작하세요';
      instructionsEl.textContent='이미지를 불러와 시작하세요';emptyHint.style.display='flex';return;}
    emptyHint.style.display='none';
    const total=measurements.length, last=measurements[total-1];
    if(total===0){statusTextEl.textContent='첫 번째 점을 탭하세요';
      instructionsEl.textContent='두 손가락으로 확대 · 2번째 점이 꼭짓점이 됩니다';return;}
    if(last.length<3){
      if(last.length===1){statusTextEl.textContent=`각도 ${total} · 꼭짓점(2번째 점)`;instructionsEl.textContent=`각도 ${total} 측정 중 · 점 2/3 (이 점이 꼭짓점)`;}
      else{statusTextEl.textContent=`각도 ${total} · 세 번째 점`;instructionsEl.textContent=`각도 ${total} 측정 중 · 점 3/3`;}
    }else{statusTextEl.textContent=`각도 ${total}개 측정 완료`;
      instructionsEl.textContent='계속 탭하면 새 각도 추가 · 점을 길게 누르면 그 각도 삭제';}
  }

  function getPos(e){const r=canvas.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top};}
  function hitTest(cp){
    let hit=null;
    measurements.forEach((g,gi)=>g.forEach((pt,pi)=>{
      const c=imageToCanvas(pt);
      if(Math.hypot(c.x-cp.x,c.y-cp.y)<HIT_R) hit={g:gi,p:pi};
    }));
    return hit;
  }
  function clearLong(){ if(longTimer){clearTimeout(longTimer);longTimer=null;} }

  function placePoint(ip){
    ip.x=Math.max(0,Math.min(imgW,ip.x)); ip.y=Math.max(0,Math.min(imgH,ip.y));
    if(measurements.length===0||measurements[measurements.length-1].length===3) measurements.push([ip]);
    else measurements[measurements.length-1].push(ip);
    vibrate(8); render();updateReadout();updateUI();
  }
  function deleteGroup(i){ measurements.splice(i,1); render();updateReadout();updateUI(); }

  canvas.addEventListener('contextmenu',e=>e.preventDefault());

  canvas.addEventListener('pointerdown',(e)=>{
    if(!img) return;
    canvas.setPointerCapture(e.pointerId);
    pointers.set(e.pointerId,getPos(e));
    if(pointers.size===2){
      clearLong();
      const pts=[...pointers.values()];
      const focal={x:(pts[0].x+pts[1].x)/2,y:(pts[0].y+pts[1].y)/2};
      pinch={dist:Math.hypot(pts[0].x-pts[1].x,pts[0].y-pts[1].y),scale:view.scale,img:canvasToImage(focal)};
      gesture='pinching';
      return;
    }
    if(pointers.size>2) return;
    const cp=getPos(e);
    const hit=hitTest(cp);
    if(hit){ gesture='pointDown'; dragTarget=hit; downPos=cp;
      clearLong();
      longTimer=setTimeout(()=>{ deleteGroup(dragTarget.g); vibrate(30); toast('각도 삭제됨'); gesture='none'; },LONGPRESS_MS);
    } else { gesture='emptyDown'; downPos=cp; panStart=cp; panStartView={...view}; }
  });

  canvas.addEventListener('pointermove',(e)=>{
    if(!pointers.has(e.pointerId)) return;
    pointers.set(e.pointerId,getPos(e));
    if(gesture==='pinching' && pointers.size>=2){
      const pts=[...pointers.values()];
      const focal={x:(pts[0].x+pts[1].x)/2,y:(pts[0].y+pts[1].y)/2};
      const dist=Math.hypot(pts[0].x-pts[1].x,pts[0].y-pts[1].y);
      let ns=pinch.scale*(dist/pinch.dist);
      ns=Math.max(fitScale,Math.min(fitScale*12,ns));
      view.scale=ns;
      view.tx=focal.x-pinch.img.x*ns; view.ty=focal.y-pinch.img.y*ns;
      clampView(); render();
      return;
    }
    const cp=getPos(e);
    if(gesture==='pointDown'){
      if(Math.hypot(cp.x-downPos.x,cp.y-downPos.y)>MOVE_THRESH){ clearLong(); gesture='draggingPoint'; }
    }
    if(gesture==='draggingPoint'){
      const ip=canvasToImage(cp); ip.x=Math.max(0,Math.min(imgW,ip.x)); ip.y=Math.max(0,Math.min(imgH,ip.y));
      measurements[dragTarget.g][dragTarget.p]=ip; render();updateReadout();updateSide();
    } else if(gesture==='emptyDown'){
      if(Math.hypot(cp.x-downPos.x,cp.y-downPos.y)>MOVE_THRESH) gesture='panning';
    }
    if(gesture==='panning'){
      view.tx=panStartView.tx+(cp.x-panStart.x); view.ty=panStartView.ty+(cp.y-panStart.y);
      clampView(); render();
    }
  });

  function onUp(e){
    const wasPos=pointers.get(e.pointerId);
    pointers.delete(e.pointerId);
    if(gesture==='pinching'){
      clearLong();
      if(pointers.size===1){ const rp=[...pointers.values()][0];
        gesture='panning'; panStart=rp; panStartView={...view}; }
      else gesture='none';
      return;
    }
    if(gesture==='pointDown'){ clearLong(); gesture='none'; return; }
    if(gesture==='emptyDown'){ clearLong(); placePoint(canvasToImage(downPos||wasPos)); gesture='none'; return; }
    clearLong(); if(pointers.size===0) gesture='none';
  }
  canvas.addEventListener('pointerup',onUp);
  canvas.addEventListener('pointercancel',(e)=>{ pointers.delete(e.pointerId); clearLong(); if(pointers.size===0) gesture='none'; });

  function loadFile(file){
    if(!file) return;
    const reader=new FileReader();
    reader.onload=(ev)=>{ const image=new Image();
      image.onload=()=>{ img=image;imgW=image.naturalWidth;imgH=image.naturalHeight;
        measurements=[]; computeFit(); setViewToFit(); resizeCanvas(); updateReadout(); updateUI(); };
      image.src=ev.target.result; };
    reader.readAsDataURL(file);
  }

  async function exportImage(){
    if(!img) return;
    const off=document.createElement('canvas'); off.width=imgW; off.height=imgH;
    const oc=off.getContext('2d');
    oc.drawImage(img,0,0,imgW,imgH);
    const s=Math.max(1,1/fitScale);
    drawScene(oc,(p)=>({x:p.x,y:p.y}),s);
    const ts=new Date(); const pad=n=>String(n).padStart(2,'0');
    const name=`angle-${ts.getFullYear()}${pad(ts.getMonth()+1)}${pad(ts.getDate())}-${pad(ts.getHours())}${pad(ts.getMinutes())}${pad(ts.getSeconds())}.png`;
    const blob=await new Promise(res=>off.toBlob(res,'image/png',0.95));
    if(!blob){ toast('저장 실패'); return; }
    const file=new File([blob],name,{type:'image/png'});
    // 1) 모바일: 공유 시트 → "사진에 저장"으로 갤러리에 저장
    if(navigator.canShare && navigator.canShare({files:[file]})){
      try{ await navigator.share({files:[file],title:'각도 측정'}); return; }
      catch(err){ if(err && err.name==='AbortError') return; }
    }
    // 2) 폴백: 다운로드
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download=name;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),3000);
    toast('이미지가 저장되었습니다');
  }

  const fileCamera=document.getElementById('fileCamera');
  const fileGallery=document.getElementById('fileGallery');
  fileCamera.addEventListener('change',e=>{loadFile(e.target.files[0]);e.target.value='';});
  fileGallery.addEventListener('change',e=>{loadFile(e.target.files[0]);e.target.value='';});
  document.getElementById('btnCamera').addEventListener('click',()=>fileCamera.click());
  document.getElementById('btnGallery').addEventListener('click',()=>fileGallery.click());
  document.getElementById('btnUndo').addEventListener('click',()=>{
    if(measurements.length===0) return;
    const last=measurements[measurements.length-1]; last.pop();
    if(last.length===0) measurements.pop();
    render();updateReadout();updateUI();
  });
  document.getElementById('btnReset').addEventListener('click',()=>{measurements=[];render();updateReadout();updateUI();});
  btnSave.addEventListener('click',exportImage);

  resizeCanvas(); updateUI();
})();
</script>
</body>
</html>
