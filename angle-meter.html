<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>디지털 각도계</title>
<style>
  :root{
    --bg: #15181D;
    --bezel: #22262D;
    --panel: #0C0F12;
    --amber: #FFB000;
    --amber-dim: rgba(255,176,0,0.35);
    --cyan: #33D6C0;
    --text: #C9D1D9;
    --text-dim: #6B7480;
    --danger: #FF5C5C;
    --radius: 18px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{
    margin:0; padding:0; height:100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
    overflow:hidden;
    overscroll-behavior:none;
  }
  #app{
    display:flex; flex-direction:column;
    height:100dvh; width:100vw;
    padding: max(10px, env(safe-area-inset-top)) max(10px, env(safe-area-inset-right)) max(10px, env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-left));
    gap:8px;
  }

  header{
    display:flex; align-items:center; gap:10px;
    padding: 4px 4px;
    flex-shrink:0;
  }
  header svg{ flex-shrink:0; }
  header h1{
    font-size:15px; font-weight:700; letter-spacing:0.06em;
    color: var(--text); margin:0;
  }
  header span{
    display:block; font-size:10px; color: var(--text-dim); letter-spacing:0.12em; margin-top:2px;
  }

  .display-panel{
    background: linear-gradient(180deg, var(--bezel), var(--bg));
    border-radius: var(--radius);
    padding: 3px;
    flex-shrink:0;
    box-shadow: 0 1px 0 rgba(255,255,255,0.04) inset, 0 6px 14px rgba(0,0,0,0.35);
  }
  .display-screen{
    background: var(--panel);
    border-radius: calc(var(--radius) - 3px);
    padding: 10px 16px;
    display:flex; align-items:center; justify-content:space-between;
    box-shadow: inset 0 2px 6px rgba(0,0,0,0.6);
  }
  .display-left{ display:flex; flex-direction:column; min-width:0; }
  .display-label{
    font-size:10px; letter-spacing:0.2em; color: var(--text-dim); font-weight:700;
  }
  #statusText{
    font-size:11.5px; color: var(--cyan); margin-top:4px; min-height:14px;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  #angleValue{
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    font-size: 38px; font-weight:700; color: var(--amber);
    text-shadow: 0 0 10px var(--amber-dim), 0 0 2px var(--amber-dim);
    letter-spacing: 0.02em;
    line-height:1;
    text-align:right; flex-shrink:0; padding-left:10px;
  }

  .angle-list{
    display:flex; gap:6px; overflow-x:auto; flex-shrink:0;
    padding: 1px 2px 4px;
  }
  .angle-list::-webkit-scrollbar{ display:none; }
  .angle-chip{
    flex-shrink:0; display:flex; align-items:center; gap:6px;
    background: var(--panel); border-radius:20px; padding:6px 12px;
    font-size:12px; font-weight:700; color: var(--text);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06);
  }
  .angle-chip .dot{ width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .angle-chip .num{ color: var(--text-dim); font-weight:600; }

  .stage-wrap{
    position:relative;
    flex:1; min-height:0;
    background: repeating-linear-gradient(0deg, #0000 0 23px, rgba(255,255,255,0.02) 23px 24px);
    border-radius: var(--radius);
    overflow:hidden;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
  }
  canvas{
    display:block; width:100%; height:100%;
    touch-action:none;
  }
  .empty-hint{
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:10px; pointer-events:none; padding:20px; text-align:center;
  }
  .empty-hint svg{ opacity:0.35; }
  .empty-hint p{
    color: var(--text-dim); font-size:13px; max-width:220px; margin:0; line-height:1.5;
  }

  .controls{
    display:grid; grid-template-columns: 1fr 1fr; gap:8px;
    flex-shrink:0;
  }
  .controls .wide{ grid-column: 1 / -1; display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  button{
    appearance:none; border:none; cursor:pointer;
    font-family:inherit; font-size:13px; font-weight:700;
    color: var(--text);
    background: linear-gradient(180deg, #2A2F37, #1D2026);
    border-radius: 12px;
    padding: 12px 8px;
    display:flex; align-items:center; justify-content:center; gap:6px;
    box-shadow: 0 2px 0 rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.06);
  }
  button:active{
    transform: translateY(1px);
    box-shadow: 0 1px 0 rgba(0,0,0,0.5), inset 0 1px 3px rgba(0,0,0,0.5);
  }
  button.primary{ color: var(--panel); background: linear-gradient(180deg, #3EE8CE, var(--cyan)); }
  button.save{ color: var(--panel); background: linear-gradient(180deg, #FFC94D, var(--amber)); }
  button.ghost{ color: var(--text-dim); background: linear-gradient(180deg, #23272E, #1A1D22); font-weight:600; font-size:12px; }
  button.danger-ghost{ color: var(--danger); background: linear-gradient(180deg, #23272E, #1A1D22); font-weight:600; font-size:12px; }
  button:disabled{ opacity:0.35; pointer-events:none; }

  #instructions{
    text-align:center; font-size:11.5px; color: var(--text-dim);
    margin:0; padding-bottom:2px; flex-shrink:0; line-height:1.5;
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
      <path d="M4 20 L20 20" stroke="#33D6C0" stroke-width="2" stroke-linecap="round"/>
      <path d="M4 20 L18 6" stroke="#33D6C0" stroke-width="2" stroke-linecap="round"/>
      <path d="M11 20 A9 9 0 0 1 12.3 13.2" stroke="#FFB000" stroke-width="2" fill="none" stroke-linecap="round"/>
    </svg>
    <h1>디지털 각도계<span>3점 터치 · 여러 각도 연속 측정</span></h1>
  </header>

  <div class="display-panel">
    <div class="display-screen">
      <div class="display-left">
        <div class="display-label" id="displayLabel">ANGLE</div>
        <div id="statusText">이미지를 불러와 시작하세요</div>
      </div>
      <div id="angleValue">--.-°</div>
    </div>
  </div>

  <div class="angle-list" id="angleList"></div>

  <div class="stage-wrap" id="stageWrap">
    <canvas id="stage"></canvas>
    <div class="empty-hint" id="emptyHint">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
        <rect x="6" y="10" width="36" height="28" rx="4" stroke="#6B7480" stroke-width="2"/>
        <circle cx="17" cy="20" r="3.5" stroke="#6B7480" stroke-width="2"/>
        <path d="M6 32 L17 24 L26 30 L34 20 L42 27" stroke="#6B7480" stroke-width="2" fill="none"/>
      </svg>
      <p>사진을 촬영하거나 갤러리에서<br>이미지를 불러오세요</p>
    </div>
  </div>

  <div class="controls">
    <div class="wide">
      <button id="btnCamera" class="primary">📷 사진 촬영</button>
      <button id="btnGallery" class="primary">🖼 갤러리에서 선택</button>
    </div>
    <button id="btnUndo" class="ghost">↩ 마지막 점 취소</button>
    <button id="btnReset" class="danger-ghost">⟲ 전체 초기화</button>
    <div class="wide">
      <button id="btnSave" class="save" disabled>💾 이미지로 저장</button>
    </div>
  </div>

  <p id="instructions">이미지를 불러와 시작하세요</p>
</div>

<input type="file" id="fileCamera" accept="image/*" capture="environment" hidden>
<input type="file" id="fileGallery" accept="image/*" hidden>

<script>
(function(){
  const canvas = document.getElementById('stage');
  const ctx = canvas.getContext('2d');
  const stageWrap = document.getElementById('stageWrap');
  const emptyHint = document.getElementById('emptyHint');
  const angleValueEl = document.getElementById('angleValue');
  const displayLabelEl = document.getElementById('displayLabel');
  const statusTextEl = document.getElementById('statusText');
  const instructionsEl = document.getElementById('instructions');
  const angleListEl = document.getElementById('angleList');
  const btnSave = document.getElementById('btnSave');

  const PALETTE = ['#33D6C0','#FF6B9D','#7C9EFF','#FFD166','#8CFF7C','#FF8F5C','#C792EA','#5CD3FF'];

  let img = null, imgW = 0, imgH = 0;
  let measurements = []; // array of groups; each group = array of up to 3 image-space points {x,y}
  let fitRect = {x:0,y:0,w:0,h:0,scale:1};
  let dragGroup = -1, dragPoint = -1, dragging = false;

  function resizeCanvas(){
    const dpr = window.devicePixelRatio || 1;
    const rect = stageWrap.getBoundingClientRect();
    canvas.width = Math.max(1, Math.round(rect.width * dpr));
    canvas.height = Math.max(1, Math.round(rect.height * dpr));
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
    render();
  }
  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 250));

  function computeFitRect(){
    const rect = canvas.getBoundingClientRect();
    const cw = rect.width, ch = rect.height;
    if(!img){ fitRect = {x:0,y:0,w:cw,h:ch,scale:1}; return; }
    const scale = Math.min(cw/imgW, ch/imgH);
    const w = imgW*scale, h = imgH*scale;
    fitRect = {x:(cw-w)/2, y:(ch-h)/2, w, h, scale};
  }
  function imageToCanvas(p){ return {x: fitRect.x + p.x*fitRect.scale, y: fitRect.y + p.y*fitRect.scale}; }
  function canvasToImage(p){ return {x: (p.x-fitRect.x)/fitRect.scale, y: (p.y-fitRect.y)/fitRect.scale}; }

  function angleOf(pt, vertex){ return Math.atan2(pt.y-vertex.y, pt.x-vertex.x); }

  function computeAngleForGroup(g){
    if(g.length<3) return null;
    const [a,v,b] = g;
    let d = Math.abs(angleOf(a,v) - angleOf(b,v));
    if(d>Math.PI) d = Math.PI*2 - d;
    return d*180/Math.PI;
  }

  function normalize(x,y){ const len=Math.hypot(x,y)||1; return {x:x/len, y:y/len}; }

  // Draws every measurement group onto the given context using mapFn (image-space -> target-space)
  // sizeScale scales stroke widths / marker sizes / fonts for high-res exports.
  function drawSceneOnContext(targetCtx, mapFn, sizeScale){
    measurements.forEach((group, gi) => {
      const color = PALETTE[gi % PALETTE.length];
      const cpts = group.map(mapFn);
      if(cpts.length>=2){
        targetCtx.save();
        targetCtx.strokeStyle = color;
        targetCtx.lineWidth = 2.5*sizeScale;
        targetCtx.beginPath();
        targetCtx.moveTo(cpts[1].x, cpts[1].y);
        targetCtx.lineTo(cpts[0].x, cpts[0].y);
        targetCtx.stroke();
        if(cpts.length>=3){
          targetCtx.beginPath();
          targetCtx.moveTo(cpts[1].x, cpts[1].y);
          targetCtx.lineTo(cpts[2].x, cpts[2].y);
          targetCtx.stroke();
        }
        targetCtx.restore();
      }
      if(cpts.length>=3){
        drawArcAndLabel(targetCtx, cpts, color, sizeScale);
      }
      cpts.forEach((p,i)=>drawPoint(targetCtx, p, i, color, sizeScale));
    });
  }

  function drawArcAndLabel(targetCtx, cpts, color, sizeScale){
    const v = cpts[1];
    const d0 = Math.hypot(cpts[0].x-v.x, cpts[0].y-v.y);
    const d2 = Math.hypot(cpts[2].x-v.x, cpts[2].y-v.y);
    const a1 = Math.atan2(cpts[0].y-v.y, cpts[0].x-v.x);
    const a2 = Math.atan2(cpts[2].y-v.y, cpts[2].x-v.x);
    let delta = a2 - a1;
    while(delta <= -Math.PI) delta += Math.PI*2;
    while(delta > Math.PI) delta -= Math.PI*2;
    const r = Math.min(46*sizeScale, 0.9*d0, 0.9*d2);
    if(r >= 6){
      targetCtx.save();
      targetCtx.strokeStyle = '#FFB000';
      targetCtx.lineWidth = 2*sizeScale;
      targetCtx.beginPath();
      targetCtx.arc(v.x, v.y, r, a1, a2, delta<0);
      targetCtx.stroke();
      targetCtx.restore();
    }
    // angle label along the bisector direction
    const u1 = normalize(cpts[0].x-v.x, cpts[0].y-v.y);
    const u2 = normalize(cpts[2].x-v.x, cpts[2].y-v.y);
    let bx = u1.x+u2.x, by = u1.y+u2.y;
    const blen = Math.hypot(bx,by);
    let bisector;
    if(blen < 1e-6) bisector = {x:-u1.y, y:u1.x};
    else bisector = {x:bx/blen, y:by/blen};
    const labelR = r + 20*sizeScale;
    const lp = {x: v.x + bisector.x*labelR, y: v.y + bisector.y*labelR};
    const deg = computeAngleForGroup_fromCanvasPts(cpts);
    const text = deg.toFixed(1)+'°';
    targetCtx.save();
    targetCtx.font = `bold ${13*sizeScale}px -apple-system, sans-serif`;
    targetCtx.textAlign = 'center';
    targetCtx.textBaseline = 'middle';
    const tw = targetCtx.measureText(text).width;
    const padX = 6*sizeScale, padY = 4*sizeScale;
    targetCtx.fillStyle = 'rgba(12,15,18,0.8)';
    roundRect(targetCtx, lp.x - tw/2 - padX, lp.y - 8*sizeScale - padY, tw + padX*2, 16*sizeScale + padY*2, 6*sizeScale);
    targetCtx.fill();
    targetCtx.fillStyle = '#FFB000';
    targetCtx.fillText(text, lp.x, lp.y);
    targetCtx.restore();
  }

  function computeAngleForGroup_fromCanvasPts(cpts){
    const v = cpts[1];
    let d = Math.abs(Math.atan2(cpts[0].y-v.y,cpts[0].x-v.x) - Math.atan2(cpts[2].y-v.y,cpts[2].x-v.x));
    if(d>Math.PI) d = Math.PI*2-d;
    return d*180/Math.PI;
  }

  function roundRect(c, x, y, w, h, r){
    c.beginPath();
    c.moveTo(x+r,y);
    c.arcTo(x+w,y,x+w,y+h,r);
    c.arcTo(x+w,y+h,x,y+h,r);
    c.arcTo(x,y+h,x,y,r);
    c.arcTo(x,y,x+w,y,r);
    c.closePath();
  }

  function drawPoint(targetCtx, p, i, color, sizeScale){
    const isVertex = i===1;
    targetCtx.save();
    targetCtx.beginPath();
    targetCtx.arc(p.x, p.y, (isVertex?10:7.5)*sizeScale, 0, Math.PI*2);
    targetCtx.fillStyle = isVertex ? '#FFB000' : color;
    targetCtx.fill();
    targetCtx.lineWidth = 2*sizeScale;
    targetCtx.strokeStyle = '#0C0F12';
    targetCtx.stroke();
    targetCtx.fillStyle = '#0C0F12';
    targetCtx.font = `bold ${11*sizeScale}px -apple-system, sans-serif`;
    targetCtx.textAlign = 'center';
    targetCtx.textBaseline = 'middle';
    targetCtx.fillText(String(i+1), p.x, p.y);
    targetCtx.restore();
  }

  function render(){
    computeFitRect();
    const rect = canvas.getBoundingClientRect();
    ctx.clearRect(0,0,rect.width,rect.height);
    if(img) ctx.drawImage(img, fitRect.x, fitRect.y, fitRect.w, fitRect.h);
    drawSceneOnContext(ctx, imageToCanvas, 1);
  }

  function lastCompleted(){
    for(let i=measurements.length-1;i>=0;i--){
      if(measurements[i].length===3) return {value: computeAngleForGroup(measurements[i]), index: i+1};
    }
    return null;
  }

  function updateReadout(){
    const last = lastCompleted();
    if(!last){ angleValueEl.textContent = '--.-°'; displayLabelEl.textContent = 'ANGLE'; }
    else { angleValueEl.textContent = last.value.toFixed(1)+'°'; displayLabelEl.textContent = `ANGLE #${last.index}`; }
  }

  function updateAngleList(){
    const chips = [];
    measurements.forEach((g, gi) => {
      if(g.length===3){
        const color = PALETTE[gi % PALETTE.length];
        const val = computeAngleForGroup(g).toFixed(1);
        chips.push(`<div class="angle-chip"><span class="dot" style="background:${color}"></span><span class="num">#${gi+1}</span>${val}°</div>`);
      }
    });
    angleListEl.innerHTML = chips.join('');
  }

  function updateUI(){
    updateAngleList();
    btnSave.disabled = !img;
    if(!img){
      statusTextEl.textContent = '이미지를 불러와 시작하세요';
      instructionsEl.textContent = '이미지를 불러와 시작하세요';
      emptyHint.style.display = 'flex';
      return;
    }
    emptyHint.style.display = 'none';
    const total = measurements.length;
    const last = measurements[total-1];
    if(total===0){
      statusTextEl.textContent = '첫 번째 점을 탭하세요';
      instructionsEl.textContent = '점 1/3 지정 중 · 2번째로 찍는 점이 각도의 꼭짓점이 됩니다';
      return;
    }
    if(last.length<3){
      const n = last.length;
      if(n===1){ statusTextEl.textContent = `각도 ${total} · 꼭짓점(2번째 점)을 탭하세요`; instructionsEl.textContent = `각도 ${total} 측정 중 · 점 2/3 · 이 점이 꼭짓점입니다`; }
      else { statusTextEl.textContent = `각도 ${total} · 세 번째 점을 탭하세요`; instructionsEl.textContent = `각도 ${total} 측정 중 · 점 3/3`; }
    } else {
      statusTextEl.textContent = `각도 ${total}개 측정 완료`;
      instructionsEl.textContent = '계속 탭하면 새 각도가 추가됩니다 · 점을 드래그해 위치 조정 가능';
    }
  }

  function getCanvasPos(e){
    const rect = canvas.getBoundingClientRect();
    return {x: e.clientX-rect.left, y: e.clientY-rect.top};
  }

  canvas.addEventListener('pointerdown', (e)=>{
    if(!img) return;
    canvas.setPointerCapture(e.pointerId);
    const cp = getCanvasPos(e);
    const hitR = 24;
    let hitG = -1, hitP = -1;
    measurements.forEach((g, gi) => {
      g.forEach((pt, pi) => {
        const cpt = imageToCanvas(pt);
        if(Math.hypot(cpt.x-cp.x, cpt.y-cp.y) < hitR){ hitG = gi; hitP = pi; }
      });
    });
    if(hitG >= 0){
      dragGroup = hitG; dragPoint = hitP; dragging = true;
      return;
    }
    const ip = canvasToImage(cp);
    ip.x = Math.max(0, Math.min(imgW, ip.x));
    ip.y = Math.max(0, Math.min(imgH, ip.y));
    if(measurements.length===0 || measurements[measurements.length-1].length===3){
      measurements.push([ip]);
    } else {
      measurements[measurements.length-1].push(ip);
    }
    render(); updateReadout(); updateUI();
  });
  canvas.addEventListener('pointermove', (e)=>{
    if(!dragging || dragGroup<0) return;
    const cp = getCanvasPos(e);
    const ip = canvasToImage(cp);
    ip.x = Math.max(0, Math.min(imgW, ip.x));
    ip.y = Math.max(0, Math.min(imgH, ip.y));
    measurements[dragGroup][dragPoint] = ip;
    render(); updateReadout(); updateAngleList();
  });
  function endDrag(){ dragging=false; dragGroup=-1; dragPoint=-1; }
  canvas.addEventListener('pointerup', endDrag);
  canvas.addEventListener('pointercancel', endDrag);

  function loadFile(file){
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev)=>{
      const image = new Image();
      image.onload = ()=>{
        img = image; imgW = image.naturalWidth; imgH = image.naturalHeight;
        measurements = [];
        resizeCanvas();
        updateReadout();
        updateUI();
      };
      image.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  }

  function exportImage(){
    if(!img) return;
    const off = document.createElement('canvas');
    off.width = imgW; off.height = imgH;
    const offCtx = off.getContext('2d');
    offCtx.drawImage(img, 0, 0, imgW, imgH);
    const sizeScale = Math.max(1, imgW / Math.max(1, fitRect.w || imgW));
    drawSceneOnContext(offCtx, (p)=>({x:p.x, y:p.y}), sizeScale);
    off.toBlob((blob)=>{
      if(!blob) return;
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const ts = new Date();
      const pad = n => String(n).padStart(2,'0');
      a.href = url;
      a.download = `angle-measure-${ts.getFullYear()}${pad(ts.getMonth()+1)}${pad(ts.getDate())}-${pad(ts.getHours())}${pad(ts.getMinutes())}${pad(ts.getSeconds())}.png`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(()=>URL.revokeObjectURL(url), 3000);
    }, 'image/png', 0.95);
  }

  const fileCamera = document.getElementById('fileCamera');
  const fileGallery = document.getElementById('fileGallery');
  fileCamera.addEventListener('change', e=>{ loadFile(e.target.files[0]); e.target.value=''; });
  fileGallery.addEventListener('change', e=>{ loadFile(e.target.files[0]); e.target.value=''; });
  document.getElementById('btnCamera').addEventListener('click', ()=>fileCamera.click());
  document.getElementById('btnGallery').addEventListener('click', ()=>fileGallery.click());
  document.getElementById('btnUndo').addEventListener('click', ()=>{
    if(measurements.length===0) return;
    const last = measurements[measurements.length-1];
    last.pop();
    if(last.length===0) measurements.pop();
    render(); updateReadout(); updateUI();
  });
  document.getElementById('btnReset').addEventListener('click', ()=>{ measurements=[]; render(); updateReadout(); updateUI(); });
  btnSave.addEventListener('click', exportImage);

  resizeCanvas();
  updateUI();
